# Cloudflare Worker + Durable Objects — Proyekto realtime transport.
#
# Replaces Supabase Realtime for the collaborative features (roadmap canvas +
# chat). One Durable Object instance per "room" (see ROOM KEY NAMESPACES in
# src/index.ts). Uses the WebSocket Hibernation API so idle rooms cost nothing.
#
# Secrets (set with `wrangler secret put <NAME>` — never commit these):
#   SUPABASE_JWT_SECRET     project JWT secret; verifies access tokens (HS256)
#   REALTIME_PUBLISH_TOKEN  shared secret the backend sends on POST /publish
#
# Plain vars below are non-secret and environment-specific.

name = "proyekto-realtime"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RealtimeRoom"

# R2 buckets for the upload route (POST /uploads). The Worker writes objects via
# these native bindings — it never touches the R2 S3 endpoint
# (*.r2.cloudflarestorage.com), so uploads work regardless of the client's
# network or the account's S3-endpoint cert state.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "proyekto-media"

[[r2_buckets]]
binding = "PRIVATE"
bucket_name = "proyekto-private"

# SQLite-backed Durable Objects (modern default; eligible on the Workers free
# plan as well as paid). The migration tag must stay stable across deploys.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeRoom"]

# These [vars] are the PRODUCTION values used by `wrangler deploy`. For local
# `wrangler dev`, the localhost equivalents in `.dev.vars` override them.
# SUPABASE_URL (for JWKS) is supplied as a secret in prod / via .dev.vars in dev.
[vars]
# Backend endpoint the Worker calls to authorize a connection (room access).
BACKEND_AUTHORIZE_URL = "https://api.proyekto.tech/api/realtime/authorize"
# Comma-separated list of allowed origins (WebSocket + upload CORS). "*" allows
# any (dev only). Apex 307-redirects to www, so the served origin is www.proyekto.tech.
# localhost:3000 is included so the web dev server (run against the deployed
# worker) passes CORS; it's safe — only pages served from the dev's own machine
# match it, and every upload/WS is still JWT-gated.
ALLOWED_ORIGINS = "https://www.proyekto.tech,https://proyekto.tech,http://localhost:3000"
# Public base URL for objects in the public R2 bucket (the upload route returns
# `${R2_PUBLIC_BASE_URL}/${key}` for public buckets).
R2_PUBLIC_BASE_URL = "https://cdn.proyekto.tech"
