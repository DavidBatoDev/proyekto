name: Android Release — Build + Publish APK/AAB

# Push a semver tag (v1.2.3) -> build a SIGNED release APK + AAB and publish a
# GitHub Release with both attached + auto-generated notes. Android only (iOS
# needs macOS/Xcode). The web bundle is built in production mode, so it targets
# https://api.proyekto.tech via the committed web/.env.production.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, no leading v), e.g. 1.2.3'
        required: true

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release + tag

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version + versionCode
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VER' is not MAJOR.MINOR.PATCH"; exit 1
          fi
          MAJOR="${VER%%.*}"; REST="${VER#*.}"; MINOR="${REST%%.*}"; PATCH="${REST#*.}"
          CODE=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          {
            echo "version=$VER"
            echo "code=$CODE"
            echo "tag=v$VER"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VER  versionCode=$CODE"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web (production) + sync Android
        working-directory: web
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Write native secret files
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$GS_B64" ] || [ -z "$KS_B64" ]; then
            echo "::error::Missing GOOGLE_SERVICES_JSON or ANDROID_KEYSTORE_BASE64 secret"; exit 1
          fi
          echo "$GS_B64" | base64 -d > web/android/app/google-services.json
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build signed APK + AAB
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease \
            -PvCode=${{ steps.ver.outputs.code }} \
            -PvName=${{ steps.ver.outputs.version }} --no-daemon

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          cp web/android/app/build/outputs/apk/release/app-release.apk "Proyekto-$V.apk"
          cp web/android/app/build/outputs/bundle/release/app-release.aab "Proyekto-$V.aab"
          ls -lh "Proyekto-$V.apk" "Proyekto-$V.aab"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Proyekto ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            Proyekto-${{ steps.ver.outputs.version }}.apk
            Proyekto-${{ steps.ver.outputs.version }}.aab
