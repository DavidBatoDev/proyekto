name: Realtime — Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'realtime/**'
      - '.github/workflows/realtime-deploy.yml'
  workflow_dispatch:

concurrency:
  group: realtime-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: realtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: realtime/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: realtime
          # Pin to the version used locally so CI deploys are reproducible and
          # don't silently drift onto wrangler 4.
          wranglerVersion: "3.114.17"
        # Secrets (SUPABASE_JWT_SECRET, REALTIME_PUBLISH_TOKEN, SUPABASE_URL) are
        # set once via `wrangler secret put` and persist across deploys — a
        # `wrangler deploy` only updates code + [vars], so it never wipes them.

      - name: Smoke test /health
        run: |
          URL="https://proyekto-realtime.lucky-mud-7121.workers.dev/health"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL" >/dev/null; then
              echo "Realtime Worker health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Realtime Worker /health did not return 200 within 5 attempts"
          exit 1
