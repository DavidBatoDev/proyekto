name: Backend — Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend

    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/backend:${{ github.sha }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.GCP_SERVICE_NAME }}" \
            --image="$IMAGE" \
            --region="${{ vars.GCP_REGION }}" \
            --platform=managed \
            --execution-environment=gen2 \
            --cpu-boost \
            --service-account="${{ vars.GCP_RUNTIME_SA }}" \
            --allow-unauthenticated \
            --no-default-url \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=20 \
            --concurrency=20 \
            --timeout=300 \
            --set-env-vars="NODE_ENV=production,REQUEST_TIMEOUT_MS=25000,SLOW_REQUEST_THRESHOLD_MS=1500,SUPABASE_FETCH_TIMEOUT_MS=12000,ENABLE_CLOUD_TRACE=true,CLOUD_TRACE_SAMPLE_RATIO=0.1,OTEL_SERVICE_NAME=proyekto-backend,REDIS_DATA_CACHE_ENABLED=true,REDIS_CACHE_PUBLIC_TTL_SECONDS=120,REDIS_CACHE_AUTH_TTL_SECONDS=45,REDIS_CACHE_DEBUG_HEADERS=false,REDIS_CACHE_MARKETPLACE_INDEX_TTL_SECONDS=86400,REDIS_CACHE_TTL_JITTER_PERCENT=10,PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }},CLOUDFLARE_PURGE_ENABLED=true,CLOUDFLARE_ZONE_ID=${{ vars.CLOUDFLARE_ZONE_ID }},CLOUDFLARE_PURGE_TIMEOUT_MS=2500" \
            --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,CLIENT_URL=CLIENT_URL:latest,CORS_ORIGINS=CORS_ORIGINS:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,CLOUDFLARE_PURGE_API_TOKEN=CLOUDFLARE_PURGE_API_TOKEN:latest" \
            --quiet

      - name: Print public endpoint
        run: |
          URL="${PUBLIC_API_URL:-https://api.proyekto.tech}"
          echo "Public URL: $URL"
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`$IMAGE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rollback command: \`gcloud run services update \"${{ vars.GCP_SERVICE_NAME }}\" --region=\"${{ vars.GCP_REGION }}\" --default-url\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test health endpoint
        run: |
          URL="${PUBLIC_API_URL:-https://api.proyekto.tech}"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL/" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Health check did not return status:ok within 5 attempts"
          exit 1
