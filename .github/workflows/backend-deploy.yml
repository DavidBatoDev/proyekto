name: Backend — Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend

    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/backend:${{ github.sha }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
      REALTIME_WORKER_URL: ${{ vars.REALTIME_WORKER_URL }}
      FCM_PUSH_ENABLED: ${{ vars.FCM_PUSH_ENABLED }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      OTA_PUBLISH_ENABLED: ${{ vars.OTA_PUBLISH_ENABLED }}
      MEETINGS_REMINDERS_ENABLED: ${{ vars.MEETINGS_REMINDERS_ENABLED }}
      GOOGLE_OAUTH_ENABLED: ${{ vars.GOOGLE_OAUTH_ENABLED }}
      KNOWLEDGE_INGEST_ENABLED: ${{ vars.KNOWLEDGE_INGEST_ENABLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail

          PUBLIC_API_URL_VALUE="${PUBLIC_API_URL:-https://api.proyekto.tech}"

          ENV_VARS="NODE_ENV=production,REQUEST_TIMEOUT_MS=25000,SLOW_REQUEST_THRESHOLD_MS=1500,SUPABASE_FETCH_TIMEOUT_MS=12000,ENABLE_CLOUD_TRACE=true,CLOUD_TRACE_SAMPLE_RATIO=0.1,OTEL_SERVICE_NAME=proyekto-backend,REDIS_DATA_CACHE_ENABLED=true,REDIS_CACHE_PUBLIC_TTL_SECONDS=120,REDIS_CACHE_AUTH_TTL_SECONDS=45,REDIS_CACHE_DEBUG_HEADERS=false,REDIS_CACHE_MARKETPLACE_INDEX_TTL_SECONDS=86400,REDIS_CACHE_TTL_JITTER_PERCENT=10,PUBLIC_API_URL=${PUBLIC_API_URL_VALUE},CLOUDFLARE_PURGE_ENABLED=false,CLOUDFLARE_PURGE_TIMEOUT_MS=2500,R2_PUBLIC_BUCKET=proyekto-media,R2_PRIVATE_BUCKET=proyekto-private,R2_PUBLIC_BASE_URL=https://cdn.proyekto.tech"
          SECRETS="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,CLIENT_URL=CLIENT_URL:latest,CORS_ORIGINS=CORS_ORIGINS:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GMAIL_CLIENT_ID=GMAIL_CLIENT_ID:latest,GMAIL_CLIENT_SECRET=GMAIL_CLIENT_SECRET:latest,GMAIL_REFRESH_TOKEN=GMAIL_REFRESH_TOKEN:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest,R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest,R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest"

          if [[ -n "${CLOUDFLARE_ZONE_ID:-}" ]] && gcloud secrets describe CLOUDFLARE_PURGE_API_TOKEN --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            ENV_VARS="${ENV_VARS},CLOUDFLARE_PURGE_ENABLED=true,CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}"
            SECRETS="${SECRETS},CLOUDFLARE_PURGE_API_TOKEN=CLOUDFLARE_PURGE_API_TOKEN:latest"
            echo "Cloudflare runtime purge enabled for this deploy."
          else
            echo "Cloudflare runtime purge disabled (missing CLOUDFLARE_ZONE_ID or CLOUDFLARE_PURGE_API_TOKEN secret)."
          fi

          # Realtime (Durable Objects) fan-out. Gated on the REALTIME_WORKER_URL repo
          # var (not a gcloud secrets describe — the deployer SA can't describe
          # secrets). To enable: create the REALTIME_PUBLISH_TOKEN secret in Secret
          # Manager, then set the REALTIME_WORKER_URL repo variable.
          if [[ -n "${REALTIME_WORKER_URL:-}" ]]; then
            ENV_VARS="${ENV_VARS},REALTIME_WORKER_URL=${REALTIME_WORKER_URL}"
            SECRETS="${SECRETS},REALTIME_PUBLISH_TOKEN=REALTIME_PUBLISH_TOKEN:latest"
            echo "Realtime (Durable Objects) publish enabled for this deploy."
          else
            echo "Realtime publish disabled (set the REALTIME_WORKER_URL repo var to enable)."
          fi

          # Firebase Cloud Messaging push — KEYLESS (Workload Identity / ADC).
          # Gated on the FCM_PUSH_ENABLED repo var. The Cloud Run runtime SA
          # authenticates to FCM via Application Default Credentials, so NO key
          # secret is stored. To enable: grant the runtime SA
          # roles/firebasecloudmessaging.admin on the Firebase project, then set the
          # FCM_PUSH_ENABLED repo var (and optionally the FIREBASE_PROJECT_ID repo
          # var; defaults to tech-proyekto-app). Until then push is a no-op.
          if [[ -n "${FCM_PUSH_ENABLED:-}" ]]; then
            FIREBASE_PROJECT_ID_VALUE="${FIREBASE_PROJECT_ID:-tech-proyekto-app}"
            ENV_VARS="${ENV_VARS},FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID_VALUE},FIREBASE_USE_ADC=true,PUSH_SEND_TIMEOUT_MS=1500"
            echo "FCM push enabled (keyless ADC) for this deploy."
          else
            echo "FCM push disabled (grant the runtime SA FCM access, then set the FCM_PUSH_ENABLED repo var to enable)."
          fi

          # Self-hosted OTA (mobile live-update) publish secret. Gated on the
          # OTA_PUBLISH_ENABLED repo var. The public check/stats endpoints work
          # without it; only the CI publish endpoints need the token. To enable:
          # create the OTA_PUBLISH_TOKEN secret in Secret Manager, then set the
          # OTA_PUBLISH_ENABLED repo var.
          if [[ -n "${OTA_PUBLISH_ENABLED:-}" ]]; then
            SECRETS="${SECRETS},OTA_PUBLISH_TOKEN=OTA_PUBLISH_TOKEN:latest"
            echo "OTA publish endpoint enabled for this deploy."
          else
            echo "OTA publish disabled (create OTA_PUBLISH_TOKEN secret, then set the OTA_PUBLISH_ENABLED repo var to enable)."
          fi

          # Meeting reminder cron secret. Gated on the MEETINGS_REMINDERS_ENABLED
          # repo var. Cloud Scheduler POSTs /api/meetings/cron/reminders with this
          # shared secret as the x-cron-secret header; until it's set the endpoint
          # denies all callers (reminders simply aren't delivered). To enable:
          # create the MEETINGS_CRON_SECRET secret in Secret Manager, then set the
          # MEETINGS_REMINDERS_ENABLED repo var.
          if [[ -n "${MEETINGS_REMINDERS_ENABLED:-}" ]]; then
            SECRETS="${SECRETS},MEETINGS_CRON_SECRET=MEETINGS_CRON_SECRET:latest"
            echo "Meeting reminder cron secret enabled for this deploy."
          else
            echo "Meeting reminders disabled (create MEETINGS_CRON_SECRET secret, then set the MEETINGS_REMINDERS_ENABLED repo var to enable)."
          fi

          # Knowledge pipeline (roadmap AI RAG). Gated on the
          # KNOWLEDGE_INGEST_ENABLED repo var. Enables the write-path outbox
          # hooks + the Cloud Scheduler-driven /api/knowledge/cron/ingest
          # endpoint. To enable: create the KNOWLEDGE_INGEST_SECRET secret in
          # Secret Manager, then set the KNOWLEDGE_INGEST_ENABLED repo var.
          if [[ -n "${KNOWLEDGE_INGEST_ENABLED:-}" ]]; then
            ENV_VARS="${ENV_VARS},KNOWLEDGE_INGEST_ENABLED=true"
            SECRETS="${SECRETS},KNOWLEDGE_INGEST_SECRET=KNOWLEDGE_INGEST_SECRET:latest"
            echo "Knowledge ingest enabled for this deploy."
          else
            echo "Knowledge ingest disabled (create KNOWLEDGE_INGEST_SECRET secret, then set the KNOWLEDGE_INGEST_ENABLED repo var to enable)."
          fi

          # Google Calendar / Meet per-user OAuth (meeting scheduling Phase 5).
          # Gated on the GOOGLE_OAUTH_ENABLED repo var. The redirect URI is derived
          # from PUBLIC_API_URL (not a secret). To enable: create the
          # GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET / GOOGLE_TOKEN_ENC_KEY
          # secrets in Secret Manager (grant the runtime SA secretAccessor), then set
          # the GOOGLE_OAUTH_ENABLED repo var. Until then the Google Meet option is
          # hidden and nothing changes.
          if [[ -n "${GOOGLE_OAUTH_ENABLED:-}" ]]; then
            ENV_VARS="${ENV_VARS},GOOGLE_OAUTH_ENABLED=true,GOOGLE_OAUTH_REDIRECT_URI=${PUBLIC_API_URL_VALUE}/api/meetings/google/callback"
            SECRETS="${SECRETS},GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,GOOGLE_TOKEN_ENC_KEY=GOOGLE_TOKEN_ENC_KEY:latest"
            echo "Google Calendar/Meet OAuth enabled for this deploy."
          else
            echo "Google OAuth disabled (create the GOOGLE_OAUTH_* secrets, then set the GOOGLE_OAUTH_ENABLED repo var to enable)."
          fi

          gcloud run deploy "${{ vars.GCP_SERVICE_NAME }}" \
            --image="$IMAGE" \
            --region="${{ vars.GCP_REGION }}" \
            --platform=managed \
            --execution-environment=gen2 \
            --cpu-boost \
            --service-account="${{ vars.GCP_RUNTIME_SA }}" \
            --allow-unauthenticated \
            --ingress=all \
            --no-default-url \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=20 \
            --concurrency=20 \
            --timeout=300 \
            --set-env-vars="$ENV_VARS" \
            --set-secrets="$SECRETS" \
            --quiet

      - name: Print public endpoint
        run: |
          URL="${PUBLIC_API_URL:-https://api.proyekto.tech}"
          echo "Public URL: $URL"
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`$IMAGE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rollback command: \`gcloud run services update \"${{ vars.GCP_SERVICE_NAME }}\" --region=\"${{ vars.GCP_REGION }}\" --default-url\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test health endpoint
        run: |
          URL="${PUBLIC_API_URL:-https://api.proyekto.tech}"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL/" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Health check did not return status:ok within 5 attempts"
          exit 1
